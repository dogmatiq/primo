syntax = "proto3";
package primo.test.proto3optional;

option go_package = "github.com/dogmatiq/primo/internal/test/proto3optional";

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_OK = 1;
  STATUS_ERR = 2;
}

// Message contains a mix of proto3 optional fields and a real oneof, to verify
// that optional fields are not misidentified as oneof members.
message Message {
  optional int32 num = 1;
  optional string str = 2;
  optional bool flag = 3;
  optional Status status = 4;
  optional Child child = 5;

  oneof choice {
    string choice_a = 6;
    int32 choice_b = 7;
  }

  message Child {}
}
